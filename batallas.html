<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking Freestyle Oficial</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e2f; color: white; padding: 20px; }
        .panel { background: #2a2a40; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
        input, select, button { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; border-radius: 5px; border: none; }
        button { background-color: #ff4757; color: white; cursor: pointer; font-weight: bold; font-size: 16px;}
        button:hover { background-color: #ff6b81; }
        
        .tabla-ranking { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e1e2f; }
        .tabla-ranking th, .tabla-ranking td { border: 1px solid #373752; padding: 10px; text-align: left; }
        .tabla-ranking th { background-color: #ff4757; color: white; }
        
        /* LA NAVEGACIÓN UNIFICADA */
        .navegacion { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 15px;}
        .navegacion a { color: #1e90ff; text-decoration: none; font-weight: bold; background: #2f3542; padding: 10px 20px; border-radius: 5px; }
        .navegacion a:hover { background: #373752; }
        
        /* Estructura de columnas */
        .layout-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .col-izq { flex: 1; min-width: 300px; }
        .col-der { flex: 2; min-width: 400px; }
    </style>
</head>
<body>

<div class="navegacion">
        <a href="batallas.html">⚙️ Calculadora</a>
        <a href="index.html">🏆 Torneos</a>
        <a href="museo.html">🏛️ Museo</a>
        <a href="perfil.html">👤 Perfil Atleta</a>
    </div>

    <div class="layout-container">
        <div class="col-izq">
            <div class="panel">
                <h2 style="color: #1e90ff; margin-top: 0;">1. Registrar MC Nuevo</h2>
                <input type="text" id="nuevoAka" placeholder="A.K.A del competidor">
                <button onclick="agregarMC()" style="background-color: #1e90ff;">Añadir al Roster Global</button>
            </div>

            <div class="panel" style="border-left: 5px solid #ff4757;">
                <h2 style="margin-top: 0; color: #ff4757;">🔍 Motor de Recálculo</h2>
                <p style="font-size: 0.9em; color: #aaa;">Aísla estadísticas. Simula la historia aplicando solo los eventos que coincidan.</p>
                
                <label>Franquicia:</label>
                <select id="filtroFranquicia">
                    <option value="TODAS">Todas (Global)</option>
                    <option value="Red Bull">Red Bull Batalla</option>
                    <option value="FMS">FMS</option>
                    <option value="God Level">God Level</option>
                    <option value="BDM">BDM</option>
                    <option value="Quinto Escalón">Quinto Escalón</option>
                    <option value="Otro">Otro</option>
                </select>
                
                <label>Desde Fecha:</label>
                <input type="date" id="filtroDesde">
                
                <label>Hasta Fecha:</label>
                <input type="date" id="filtroHasta">
                
                <button onclick="aplicarFiltros()" style="margin-top: 15px;">⚙️ Recalcular Tabla</button>
            </div>
        </div>

        <div class="col-der">
            <div class="panel">
                <h2 id="tituloTabla" style="margin-top: 0;">3. Tabla de Posiciones Global</h2>
                <table class="tabla-ranking">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>A.K.A</th>
                            <th>Elo</th>
                            <th>Batallas</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoRanking"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="calculadora.js"></script>
</body>
</html>
