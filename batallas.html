<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking Freestyle Oficial</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: white; padding: 20px; border-radius: 8px; flex: 1; min-width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;}
        button:hover { background-color: #218838; }
        .tabla-ranking { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .tabla-ranking th, .tabla-ranking td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        .tabla-ranking th { background-color: #333; color: white; }
        .btn-enlace { display: inline-block; background-color: #1e90ff; color: white; text-align: center; text-decoration: none; padding: 12px; border-radius: 5px; font-weight: bold; width: 100%; box-sizing: border-box; margin-top: 15px;}
        .btn-enlace:hover { background-color: #3742fa; }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; gap: 20px; flex: 1; min-width: 300px;">
        <div class="panel">
            <h2>1. Registrar MC Nuevo</h2>
            <input type="text" id="nuevoAka" placeholder="A.K.A del competidor">
            <button onclick="agregarMC()">Añadir al Roster</button>
        </div>

        <div class="panel">
            <h2>2. Batalla Rápida (Exhibición)</h2>
            <p style="font-size: 0.9em; color: #555;">Suma o resta puntos sin vincularlo a un torneo.</p>
            <label>Competidor 1:</label> <select id="selectMc1"></select>
            <label>Competidor 2:</label> <select id="selectMc2"></select>
            <label>Resultado para el Competidor 1:</label>
            <select id="resultadoBatalla">
                <option value="victoria_total">Victoria Total (100% votos a favor)</option>
                <option value="victoria">Victoria Normal</option>
                <option value="victoria_replica">Victoria tras Réplica</option>
                <option value="derrota_replica">Derrota tras Réplica</option>
                <option value="derrota">Derrota Directa</option>
                <option value="derrota_total">Derrota Total (100% votos en contra)</option>
            </select>
            <button onclick="procesarBatalla()">Calcular y Guardar</button>
            <div id="textoResultado" style="margin-top: 15px; font-weight: bold;"></div>
        </div>

        <div class="panel" style="border: 2px solid #1e90ff; background-color: #f0f8ff;">
            <h2 style="color: #1e90ff; margin-top: 0;">🏆 Historial de Torneos</h2>
            <p style="font-size: 0.9em; color: #555;">Calcula pozos, llaves y registra eventos oficiales para el historial.</p>
            <a href="index.html" class="btn-enlace">Registrar Nuevo Torneo</a>
        </div>
    </div>

    <div class="panel" style="flex: 2; min-width: 400px;">
        <h2>3. Tabla de Posiciones Global</h2>
        <table class="tabla-ranking">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>A.K.A</th>
                    <th>Elo</th>
                    <th>Batallas</th>
                </tr>
            </thead>
            <tbody id="cuerpoRanking"></tbody>
        </table>
    </div>

    <script type="module" src="calculadora.js"></script>
</body>
</html>
