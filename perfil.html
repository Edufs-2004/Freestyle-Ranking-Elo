<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil del Atleta - Liga Fénix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e2f; color: white; padding: 20px; }
        .panel { background: #2a2a40; padding: 20px; border-radius: 8px; max-width: 1000px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        .navegacion { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 15px;}
        .navegacion a { color: #1e90ff; text-decoration: none; font-weight: bold; background: #2f3542; padding: 10px 20px; border-radius: 5px; }
        .navegacion a:hover { background: #373752; }
        
        .buscador-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; border-radius: 5px; border: none; background: #fff; color: #333; font-size: 16px; box-sizing: border-box; margin-bottom: 10px;}
        .sugerencias-box { position: absolute; top: 100%; left: 0; right: 0; background: #fff; color: #333; border-radius: 0 0 5px 5px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .sugerencia-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .sugerencia-item:hover { background: #f0f8ff; color: #1e90ff; font-weight: bold; }
        
        .perfil-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; margin-top: 10px; position: relative;}
        .perfil-foto { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #eccc68; background-color: #373752; box-shadow: 0 0 15px rgba(236, 204, 104, 0.4);}
        .perfil-info h1 { margin: 0; font-size: 42px; color: #fff; text-transform: uppercase; letter-spacing: 2px;}
        .perfil-info span { font-size: 24px; }
        
        button { cursor: pointer; font-weight: bold; border-radius: 5px; border: none; padding: 10px 15px; }
        .btn-editar { background: #57606f; color: white; position: absolute; top: 0; right: 0;}
        .btn-editar:hover { background: #747d8c; }
        .btn-guardar { background: #2ed573; color: white; width: 48%; }
        .btn-cancelar { background: #ff4757; color: white; width: 48%; }

        .form-edicion { background: #1e1e2f; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px dashed #1e90ff; display: none; }
        .filtros-perfil { background: #1e1e2f; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; border-left: 4px solid #ff4757;}

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #1e1e2f; padding: 15px; border-radius: 8px; text-align: center; border-bottom: 4px solid #1e90ff;}
        .stat-card h3 { margin: 0; font-size: 14px; color: #aaa; text-transform: uppercase;}
        .stat-card p { margin: 10px 0 0 0; font-size: 28px; font-weight: bold; color: white;}
        
        .chart-container { background: #1e1e2f; padding: 15px; border-radius: 8px; height: 300px; margin-bottom: 30px; }
        
        table { width: 100%; border-collapse: collapse; background: #1e1e2f; }
        th, td { border: 1px solid #373752; padding: 10px; text-align: left; font-size: 14px;}
        th { background-color: #ff4757; color: white; }
        .win { color: #2ed573; font-weight: bold;}
        .loss { color: #ff4757; font-weight: bold;}
    </style>
</head>
<body>

    <div class="navegacion">
        <a href="batallas.html">⚙️ Calculadora</a>
        <a href="index.html">🏆 Torneos</a>
        <a href="museo.html">🏛️ Museo</a>
        <a href="perfil.html" style="background: #1e90ff; color: white;">👤 Perfil Atleta</a>
    </div>

    <div class="panel">
        <h2 style="margin-top: 0; color: #1e90ff;">👤 Buscar Freestyler</h2>
        
        <div class="buscador-wrapper">
            <input type="text" id="buscadorMCs" placeholder="🔍 Escribe el nombre del MC para ver su perfil..." onkeyup="filtrarBuscador()" autocomplete="off">
            <div id="sugerenciasMCs" class="sugerencias-box"></div>
        </div>
        
        <div id="zonaPerfil" style="display: none;">
            
            <div class="perfil-header">
                <img id="imgAtleta" class="perfil-foto" src="https://via.placeholder.com/150/373752/FFFFFF?text=MC" alt="Foto del MC">
                <div class="perfil-info">
                    <h1 id="nombreMC">NOMBRE</h1>
                    <span id="banderaMC">🌍</span>
                </div>
                <button class="btn-editar" onclick="abrirEdicion()">✏️ Editar Atleta</button>
            </div>

            <div id="formEdicion" class="form-edicion">
                <h3 style="margin-top: 0; color: #1e90ff;">Actualizar Datos Visuales</h3>
                <input type="text" id="editAka" placeholder="Nombre A.K.A">
                <input type="text" id="editNacionalidad" placeholder="Bandera (Ej: 🇪🇸)">
                <input type="text" id="editFoto" placeholder="URL de la Foto (Ej: https://...)">
                <div style="display: flex; justify-content: space-between;">
                    <button class="btn-guardar" onclick="guardarEdicion()">💾 Guardar Cambios</button>
                    <button class="btn-cancelar" onclick="cerrarEdicion()">❌ Cancelar</button>
                </div>
            </div>

            <div class="filtros-perfil">
                <div style="flex: 1; min-width: 150px;">
                    <select id="filtroFranqPerfil" style="margin: 0;">
                    </select>
                </div>
                <div style="flex: 1; min-width: 130px;"><input type="date" id="filtroDesdePerfil" style="margin: 0;"></div>
                <div style="flex: 1; min-width: 130px;"><input type="date" id="filtroHastaPerfil" style="margin: 0;"></div>
                <button onclick="aplicarFiltroPerfil()" style="background: #ff4757; color: white;">⚙️ Filtrar</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card" style="border-color: #1e90ff;">
                    <h3>Elo Actual</h3>
                    <p id="statEloActual">-</p>
                </div>
                <div class="stat-card" style="border-color: #eccc68;">
                    <h3>Elo Máximo (Peak)</h3>
                    <p id="statPeakElo">-</p>
                </div>
                <div class="stat-card" style="border-color: #ff4757;">
                    <h3>Batallas Jugadas</h3>
                    <p id="statBatallas">-</p>
                </div>
                <div class="stat-card" style="border-color: #2ed573;">
                    <h3>Tasa de Victoria</h3>
                    <p id="statWinRate">-</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="eloChart"></canvas>
            </div>

            <h3 style="color: #1e90ff; border-bottom: 1px solid #373752; padding-bottom: 10px;">📜 Historial de Enfrentamientos</h3>
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Torneo</th>
                        <th>Fase</th>
                        <th>Oponente</th>
                        <th>Resultado</th>
                        <th>Pts Previos</th>
                        <th>Cambio</th>
                    </tr>
                </thead>
                <tbody id="cuerpoHistorial"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="js/perfil.js"></script>
    <div style="position: fixed; bottom: 10px; right: 15px; color: #57606f; font-size: 14px; font-weight: bold; pointer-events: none; z-index: 9999;">V2.3.7</div>
</body>
</html>
