<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Batallas Freestyle</title>
    <style>
        /* Un poco de CSS rápido para que no se vea feo */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .calculadora { background: white; padding: 20px; border-radius: 8px; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; margin-top: 10px; padding: 10px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        .resultado { margin-top: 20px; font-weight: bold; font-size: 1.1em; color: #333; }
    </style>
</head>
<body>

    <div class="calculadora">
        <h2>Registrar Batalla</h2>
        
        <label>Elo Competidor 1:</label>
        <input type="number" id="elo1" value="1500">

        <label>Elo Competidor 2:</label>
        <input type="number" id="elo2" value="1500">

<label>Resultado para el Competidor 1:</label>
        <select id="resultadoBatalla">
            <option value="victoria_total">Victoria Total (100% votos a favor)</option>
            <option value="victoria">Victoria Normal</option>
            <option value="victoria_replica">Victoria tras Réplica</option>
            <option value="derrota_replica">Derrota tras Réplica</option>
            <option value="derrota">Derrota Directa</option>
            <option value="derrota_total">Derrota Total (100% votos en contra)</option>
        </select>

        <button onclick="procesarBatalla()">Calcular Nuevo Elo</button>

        <div class="resultado" id="textoResultado">Esperando datos...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
