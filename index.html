<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Global - Freestyle Power Ranking Elo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --glass-bg: rgba(20, 20, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --neon-cyan: #00d2d3;
            --neon-gold: #feca57;
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top center, #1a1a2e 0%, var(--bg-color) 100%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NAVEGACIÓN PÚBLICA */
        .nav-public {
            width: 100%;
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        .logo span { color: var(--neon-cyan); }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--neon-cyan); }
        .nav-links a.active { color: var(--neon-cyan); }

        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1000px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .hero-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 48px;
            text-align: center;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .hero-subtitle {
            text-align: center;
            color: var(--neon-cyan);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
        }

        /* EFECTO CRISTAL */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            padding: 25px;
            margin-bottom: 30px;
        }

        /* FILTROS */
        .filters-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        
        input[type="date"], select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #373752;
            color: white;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 210, 211, 0.2); }

        .btn-neon {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-neon:hover { background: var(--neon-cyan); color: var(--bg-color); box-shadow: 0 0 15px rgba(0, 210, 211, 0.6); }

        /* TABLA DE RANKING V3.0 */
        .ranking-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        
        th { padding: 15px; text-align: left; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 16px 15px; background: rgba(255, 255, 255, 0.02); border-top: 1px solid rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.03); font-family: 'Rajdhani', sans-serif; font-size: 18px; transition: all 0.2s ease; }

        tr td:first-child { border-left: 1px solid rgba(255, 255, 255, 0.03); border-top-left-radius: 8px; border-bottom-left-radius: 8px; font-weight: bold; color: var(--text-muted);}
        tr td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.03); border-top-right-radius: 8px; border-bottom-right-radius: 8px; color: var(--text-muted);}

        tbody tr:hover td { background: rgba(0, 210, 211, 0.08); transform: scale(1.01); cursor: pointer; border-color: rgba(0, 210, 211, 0.3); }

        tbody tr:nth-child(1) td { background: rgba(254, 202, 87, 0.05); border-color: rgba(254, 202, 87, 0.2); }
        tbody tr:nth-child(1) td:nth-child(1) { color: var(--neon-gold); text-shadow: 0 0 10px rgba(254, 202, 87, 0.5); font-size: 22px; }
        tbody tr:nth-child(1) td:nth-child(2) { font-weight: bold; color: var(--neon-gold); }

        tbody tr:nth-child(2) td:nth-child(1) { color: #c8d6e5; font-size: 20px; }
        tbody tr:nth-child(3) td:nth-child(1) { color: #cd6133; font-size: 19px; }

        .footer { text-align: center; padding: 30px; color: #57606f; font-size: 12px; margin-top: auto; }
    </style>
</head>
<body>

    <nav class="nav-public">
        <div class="nav-content">
            <a href="index.html" class="logo">FREESTYLE POWER <span>RANKING ELO</span></a>
            <div class="nav-links">
                <a href="index.html" class="active">LEADERBOARD</a>
                <a href="perfil.html">PERFILES</a>
                <a href="login.html" style="opacity: 0.5;">ADMIN LOGIN 🔒</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="hero-title">Leaderboard Oficial</h1>
        <p class="hero-subtitle" id="tituloTabla">Clasificación Histórica Global</p>

        <div class="glass-panel">
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Franquicia</label>
                    <select id="filtroFranquicia"></select>
                </div>
                <div class="filter-group">
                    <label>Modo de Análisis</label>
                    <select id="modoAnalisisCalc">
                        <option value="historico">Línea Temporal (Global)</option>
                        <option value="aislado">Universo Aislado (Reset 1500)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Fecha Desde</label>
                    <input type="date" id="filtroDesde">
                </div>
                <div class="filter-group">
                    <label>Fecha Hasta</label>
                    <input type="date" id="filtroHasta">
                </div>
                <div class="filter-group" style="flex: 0.5;">
                    <button class="btn-neon" onclick="aplicarFiltros()">APLICAR</button>
                </div>
            </div>
        </div>

        <div class="ranking-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">Rank</th>
                        <th style="width: 50%;">Competidor</th>
                        <th style="width: 20%;">Puntos Elo</th>
                        <th style="width: 20%;">Batallas</th>
                    </tr>
                </thead>
                <tbody id="cuerpoRanking">
                    <tr><td colspan="4" style="text-align: center; color: #a4b0be; padding: 40px;">Cargando base de datos estelar...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        FREESTYLE POWER RANKING ELO V3.0 © 2026
    </div>

    <script type="module" src="js/calculadora.js?v=5.0"></script>
</body>
</html>
