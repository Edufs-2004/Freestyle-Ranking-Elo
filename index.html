<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Torneos - Liga Fénix</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e2f; color: white; padding: 20px; }
        .panel { background: #2a2a40; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background-color: #ff4757; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 16px; margin-top: 15px; }
        button:hover { background-color: #ff6b81; }
        
        /* Estilo para la lista de checkboxes */
        .grid-mcs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #1e1e2f; padding: 15px; border-radius: 5px; max-height: 300px; overflow-y: auto; }
        .grid-mcs label { cursor: pointer; display: flex; align-items: center; gap: 10px; background: #373752; padding: 8px; border-radius: 4px; }
        
        .navegacion { text-align: center; margin-bottom: 20px; }
        .navegacion a { color: #1e90ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navegacion">
        <a href="batallas.html">⚙️ Ir a la Calculadora de Batallas (Modo Libre)</a>
    </div>

    <div class="panel">
        <h2>🏆 Organizar Nuevo Evento</h2>
        
        <label>Nombre del Torneo:</label>
        <input type="text" id="nombreTorneo" placeholder="Ej: Red Bull Nacional 2026">

        <h3>Elige a los participantes (Selecciona 4)</h3>
        <div id="listaCheckboxes" class="grid-mcs">
            Cargando competidores desde la nube...
        </div>

        <button onclick="iniciarTorneo()">Generar Cuadro y Calcular Pozo</button>
        
        <div id="mensajeConsola" style="margin-top: 20px; font-weight: bold; text-align: center; color: #2ed573;"></div>
    </div>

    <script type="module" src="torneos.js"></script>
</body>
</html>
